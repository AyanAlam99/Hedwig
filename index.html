<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedwig Web UI</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding-top: 50px; }
        #status { font-size: 20px; color: #1DB954; margin-bottom: 20px; }
        .log-box { background: #1e1e1e; padding: 20px; border-radius: 10px; width: 80%; max-width: 500px; margin: 0 auto; min-height: 100px; text-align: left; font-family: monospace; color: #aaa; }
    </style>
</head>
<body>

    <h2>Hedwig OS</h2>
    <div id="status">Tap anywhere to initialize...</div>
    
    <div class="log-box" id="log">System ready...<br></div>

<script>
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    // --- 1. THE TTS MODULE (MOUTH) ---
    function hedwigSpeak(text) {
        // Cancel any currently playing speech
        window.speechSynthesis.cancel(); 
            
        const utterance = new SpeechSynthesisUtterance(text);
        
        // Optional: Pick a specific voice (e.g., a UK English female voice)
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => v.lang.includes('en-GB') || v.lang.includes('en-US'));
        if (preferredVoice) utterance.voice = preferredVoice;

        utterance.rate = 1.0; 
        window.speechSynthesis.speak(utterance);
        
        logToScreen(`Hedwig: "${text}"`);
    }

    // --- 2. THE WAKE WORD MODULE (EARS) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognizer = new SpeechRecognition();
    
    // continuous=true keeps the mic open 24/7 in the browser tab
    recognizer.continuous = true;
    recognizer.interimResults = false;
    recognizer.lang = 'en-IN'; // Works well for Hinglish

    let isAwake = false;

    recognizer.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
        logToScreen(`Heard: ${transcript}`);

        // CHECK FOR WAKE WORD
        if (!isAwake && (transcript.includes("hedwig") || transcript.includes("head wig"))) {
            isAwake = true;
            statusEl.textContent = "Listening to command...";
            statusEl.style.color = "#e74c3c";
            
            hedwigSpeak("Yes?");
            return;
        }

        // IF ALREADY AWAKE, CAPTURE THE ACTUAL COMMAND
        // IF ALREADY AWAKE, CAPTURE THE ACTUAL COMMAND
        if (isAwake) {
            logToScreen(`Sending to server: "${transcript}"`);
            statusEl.textContent = "Processing...";
            
            // Make the HTTP POST request to your FastAPI backend
            fetch('http://localhost:8000/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ transcript: transcript })
            })
            .then(response => response.json())
            .then(data => {
                // Read the backend's response out loud!
                hedwigSpeak(data.message);
                
                isAwake = false; 
                statusEl.textContent = "Sleeping... say 'Hey Hedwig'";
                statusEl.style.color = "#1DB954";
            })
            .catch(error => {
                logToScreen(`Server Error: ${error}`);
                hedwigSpeak("Sorry, I couldn't reach the server.");
                isAwake = false;
                statusEl.textContent = "Sleeping... say 'Hey Hedwig'";
            });
        }
        
    };

    // Auto-restart if it crashes or stops
    recognizer.onend = () => {
        try { recognizer.start(); } catch(e) {}
    };

    function logToScreen(msg) {
        logEl.innerHTML += msg + "<br>";
        logEl.scrollTop = logEl.scrollHeight;
    }

    // Browsers require a physical click before allowing audio/mic to start automatically
    document.body.addEventListener('click', () => {
        if (statusEl.textContent.includes("initialize")) {
            recognizer.start();
            statusEl.textContent = "Sleeping... say 'Hey Hedwig'";
            
            // Load voices into memory
            window.speechSynthesis.getVoices(); 
        }
    }, {once: true});

</script>
</body>
</html>
